services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: uptime
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    volumes:
      - redis_data:/data

  fastapi-app:
    build:
      context: ./backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:yourpassword@postgres:5432/uptime
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-me
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  redis_data:
